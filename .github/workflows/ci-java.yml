name: Docker image (Java)

on:
  push:
    branches:
      - master
    paths:
      - '**/ci-java.yml'
      - 'java-graalvm.Dockerfile'
      - 'java-bellsoft.Dockerfile'
      - 'java.entrypoint.sh'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  java:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip-ci]') }}
    strategy:
      fail-fast: false
      matrix:
        java_version: [11, 17, 21, 25]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set Dockerfile path
        id: set_dockerfile
        run: |
          if [ ${{ matrix.java_version }} -lt 21 ]; then
            echo "dockerfile=java-bellsoft.Dockerfile" >> $GITHUB_OUTPUT
          else
            echo "dockerfile=java-graalvm.Dockerfile" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to DockerHub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          build-args: JAVA_VERSION=${{ matrix.java_version }}
          context: .
          file: ${{ steps.set_dockerfile.outputs.dockerfile }}
          platforms: linux/amd64, linux/arm64
          push: true
          tags: djoh/all-in-one:java${{ matrix.java_version }}
          cache-from: type=registry,ref=djoh/all-in-one:buildcache_java${{ matrix.java_version }}
          cache-to: type=registry,ref=djoh/all-in-one:buildcache_java${{ matrix.java_version }},mode=max
